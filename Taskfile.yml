version: "3"

vars:
  WEB_DIR: web

tasks:
  default:
    desc: Build React SPA + TypeScript CLI
    cmds:
      - task: build

  build:
    desc: Build React SPA and TypeScript CLI
    deps: [web:build]
    cmds:
      - npm run build

  dev:
    desc: Start Vite dev server (use with ALFRED_DEV=1 alfred dashboard)
    dir: "{{.WEB_DIR}}"
    cmds:
      - npm run dev

  check:
    desc: Run all checks (tsc + Biome lint)
    cmds:
      - npm run typecheck
      - npm run lint

  fix:
    desc: Auto-fix Biome lint/format issues (safe)
    cmds:
      - npm run lint:fix

  fix:unsafe:
    desc: Auto-fix all Biome issues including unsafe fixes
    cmds:
      - npx biome check --write --unsafe src/ web/src/

  test:
    desc: Run vitest
    cmds:
      - npm test

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf dist {{.WEB_DIR}}/dist

  # Internal tasks
  web:build:
    desc: Build React SPA
    dir: "{{.WEB_DIR}}"
    cmds:
      - npm run build
    sources:
      - src/**/*
      - index.html
      - vite.config.ts
      - tsconfig.json
      - package.json
    generates:
      - dist/**/*

